<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BizTop</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <h1>&#9654; BizTop</h1>
  <span class="subtitle">Compte de r&eacute;sultat</span>
  <nav id="year-nav" aria-label="Exercice comptable"></nav>
</header>

<main>

  <section id="view-dashboard">
    <section class="overview">
      <aside class="kpis">
        <div class="kpi">
          <span class="dot dot-ca"></span>
          <span class="label">Chiffre d'affaires</span>
          <strong class="value" id="kpi-ca"></strong>
        </div>
        <div class="kpi">
          <span class="dot dot-charges"></span>
          <span class="label">Charges d'exploitation</span>
          <strong class="value" id="kpi-charges"></strong>
        </div>
        <div class="kpi">
          <span class="dot dot-resultat"></span>
          <span class="label">R&eacute;sultat d'exploitation</span>
          <strong class="value" id="kpi-resultat"></strong>
        </div>
      </aside>
      <div class="chart-wrap">
        <canvas id="chart-monthly"></canvas>
      </div>
    </section>

    <section class="accordion" id="section-revenue"></section>
    <section class="accordion" id="section-charges"></section>
  </section>

  <section id="view-transactions" hidden>
    <a class="back-link" id="tx-back" href="#">&larr; Retour</a>
    <section class="table-box">
      <h2 id="tx-title"></h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Libell&eacute;</th>
            <th class="num">D&eacute;bit</th>
            <th class="num">Cr&eacute;dit</th>
          </tr>
        </thead>
        <tbody id="tx-tbody"></tbody>
        <tfoot id="tx-tfoot"></tfoot>
      </table>
    </section>
  </section>

</main>

<script src="/static/app.js"></script>
</body>
</html>
