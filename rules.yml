# BizTop rules - single source of truth for business rules.
# Edited by hand, read by the app on every request (no restart needed).

# Expenses that are legally company charges but really manager compensation.
# comptes: ratio = portion of the expense counted as management fees (0..1).
# libelle_patterns: case-insensitive regexes on the libelle, counted in full.
management_fees:
  comptes:
    - compte: "625700"        # Restaurants et repas d'affaires
      ratio: 0.7
    - compte: "625100"        # Frais de deplacements
      ratio: 0.8
  libelle_patterns:
    - E M D
    - airbnb
    - quote[ -]?part
    - yespark
    - haussmann
    - rivalist
    - eplaques
    - AMV
    - CAPNORD
    - Actena
    - Axxe
    - quinta
  exclude_patterns:           # regexes that veto a match, e.g. [team offsite]
    - deliveroo

# Clients view: invoices billed under the key name are counted under the
# value name instead (exact match on the name extracted from the libelle).
client_aliases:
  Agilane Pajaniradja: FRASS

# Davai revenue types used to classify Attio deals when estimating the
# pipeline (Objectifs tab). billing drives how codex reads the amount:
#   one-shot: amount_eur is the deal value still expected to be invoiced
#   mrr:      amount_eur is the monthly recurring revenue (Attio MRR field)
attio_types:
  - name: Projects
    billing: one-shot
    description: custom software projects
  - name: Maintenance & Hosting
    billing: mrr
    description: recurring maintenance, hosting and support contracts
  - name: Prezence
    billing: mrr
    description: the Prezence product
  - name: Bodacker
    billing: mrr
    description: the Bodacker product
